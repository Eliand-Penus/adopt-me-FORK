<!DOCTYPE html>
<html>
<head>
    <title>Edit Pet</title>
</head>
<body>

<h1>Edit Pet</h1>

<form method="POST">

    <input
        type="text"
        name="pet_name"
        value="{{ pet.pet_name }}"
    >

    <input
        type="text"
        name="breed"
        value="{{ pet.breed }}"
    >

    <input
        type="number"
        name="age"
        value="{{ pet.age }}"
    >

    <input
        type="text"
        name="gender"
        value="{{ pet.gender }}"
    >

    <input
        type="text"
        name="color"
        value="{{ pet.color }}"
    >

    <textarea
        name="description"
    >{{ pet.description }}</textarea>

    <button type="submit">
        Save Changes
    </button>

</form>

</body>
</html>
