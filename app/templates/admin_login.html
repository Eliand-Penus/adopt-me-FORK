<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Adopt Me</title>
    <!-- Google Fonts Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#007d8e',
                            accent: '#ff5e1c',
                            text: '#2A2A2A',
                            bg: '#F8FAFB',
                            secondary: '#F2F5F7',
                            border: '#E5E7EB'
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen text-slate-200 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    
    <!-- Background glow decoration -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-primary/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-brand-accent/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 text-center space-y-2">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-primary/15 text-brand-primary mb-2 border border-brand-primary/30 shadow-lg shadow-brand-primary/10">
            <i data-lucide="shield" class="w-7 h-7"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">
            System Administration
        </h2>
        <p class="text-slate-400 text-sm font-semibold max-w-xs mx-auto">
            Secure administrative access portal for Adopt Me operations.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="bg-slate-900/80 backdrop-blur-md py-8 px-6 sm:px-10 border border-slate-800 rounded-3xl shadow-2xl space-y-6">
            <form method="POST" action="/admin/login" class="space-y-6">
                
                <!-- Email -->
                <div class="space-y-2">
                    <label for="email" class="block text-xs font-extrabold uppercase tracking-wider text-slate-400">Admin Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <i data-lucide="mail" class="w-4.5 h-4.5"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required placeholder="admin@adoptme.com"
                               class="block w-full pl-11 pr-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white placeholder-slate-650 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-brand-primary sm:text-sm font-medium transition duration-200">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label for="password" class="block text-xs font-extrabold uppercase tracking-wider text-slate-400">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <i data-lucide="lock" class="w-4.5 h-4.5"></i>
                        </div>
                        <input id="password" name="password" type="password" required placeholder="••••••••"
                               class="block w-full pl-11 pr-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white placeholder-slate-650 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-brand-primary sm:text-sm font-medium transition duration-200">
                    </div>
                </div>

                <div>
                    <button type="submit" 
                            class="w-full py-3.5 rounded-xl text-sm font-bold text-white bg-brand-primary hover:bg-[#006674] shadow-lg shadow-brand-primary/10 hover:shadow-brand-primary/20 hover:scale-[1.02] active:scale-[0.98] transition duration-200 flex items-center justify-center gap-2 cursor-pointer">
                        <i data-lucide="key" class="w-4 h-4"></i>
                        <span>Access Dashboard</span>
                    </button>
                </div>
            </form>
        </div>
        
        <p class="mt-6 text-center text-sm">
            <a href="/" class="inline-flex items-center gap-1.5 text-slate-500 hover:text-brand-primary transition font-bold">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>Back to public site</span>
            </a>
        </p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
