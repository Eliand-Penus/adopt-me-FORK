<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Adopt Me{% endblock %}</title>
    
    <!-- Google Fonts Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Shared Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#007d8e',
                            accent: '#ff5e1c',
                            text: '#2A2A2A',
                            bg: '#F8FAFB',
                            secondary: '#F2F5F7',
                            border: '#E5E7EB',
                            success: '#22C55E',
                            danger: '#EF4444',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS Resets -->
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            color: #2A2A2A;
            background-color: #F8FAFB;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F8FAFB;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #007d8e;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %} min-h-screen flex flex-col antialiased relative">

    <!-- Global Low-Opacity Background Decor (5% Opacity) -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0 select-none opacity-[0.05]">
        <!-- Top Left Blob -->
        <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-[#007d8e] blur-3xl"></div>
        <!-- Bottom Right Blob -->
        <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-[#ff5e1c] blur-3xl"></div>
        <!-- Left Middle Faint Gray Blob -->
        <div class="absolute top-1/2 -left-20 w-80 h-80 rounded-full bg-slate-300 blur-3xl"></div>
        
        <!-- Faint Paw print SVGs distributed organically -->
        <svg class="absolute top-24 left-10 w-16 h-16 text-[#007d8e] rotate-12" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="14" r="4"/><circle cx="6.5" cy="8.5" r="2"/><circle cx="10.5" cy="5" r="2"/><circle cx="17.5" cy="8.5" r="2"/><circle cx="13.5" cy="5" r="2"/>
        </svg>
        <svg class="absolute bottom-24 right-12 w-20 h-20 text-[#ff5e1c] -rotate-12" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="14" r="4"/><circle cx="6.5" cy="8.5" r="2"/><circle cx="10.5" cy="5" r="2"/><circle cx="17.5" cy="8.5" r="2"/><circle cx="13.5" cy="5" r="2"/>
        </svg>
        <svg class="absolute top-1/3 right-1/4 w-12 h-12 text-slate-300 rotate-[45deg]" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="14" r="4"/><circle cx="6.5" cy="8.5" r="2"/><circle cx="10.5" cy="5" r="2"/><circle cx="17.5" cy="8.5" r="2"/><circle cx="13.5" cy="5" r="2"/>
        </svg>
        <svg class="absolute bottom-1/3 left-1/4 w-14 h-14 text-[#007d8e] -rotate-[30deg]" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="14" r="4"/><circle cx="6.5" cy="8.5" r="2"/><circle cx="10.5" cy="5" r="2"/><circle cx="17.5" cy="8.5" r="2"/><circle cx="13.5" cy="5" r="2"/>
        </svg>
    </div>

    <!-- Automatic Navbar inclusion -->
    {% include 'components/navbar.html' %}

    <!-- Page Specific Actions -->
    {% block page_actions %}{% endblock %}

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Extra Page Specific JS -->
    {% block extra_js %}{% endblock %}
    
    <!-- Initialize Lucide Icons Globally -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
